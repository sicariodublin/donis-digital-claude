# Netlify deployment configuration for FS Digital
#
# This site is a static HTML/CSS/JS site (no build step).
# The contact form on donis-digital.html is detected by Netlify Forms
# via the `data-netlify="true"` attribute and the hidden `form-name` input.
#
# To set the destination email (fabiosteyer@gmail.com), go to:
#   Netlify dashboard → Site → Forms → Form notifications → Add notification
#   → Email notification → form: "contact", email: fabiosteyer@gmail.com
# (Form notification routing cannot be configured in netlify.toml — it lives
#  in the Netlify dashboard UI.)

[build]
  publish = "."
  # No build command — files are served directly.

# Redirect the bare index.html (which is just a meta-refresh) to the main page.
[[redirects]]
  from = "/index.html"
  to = "/donis-digital.html"
  status = 301
  force = false

# Pretty URL for the root.
[[redirects]]
  from = "/"
  to = "/donis-digital.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long cache for the SVG logo / static assets that are content-stable.
[[headers]]
  for = "/Print_Transparent.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
